<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegrom</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:white;
}

.app{
  max-width:1000px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:18px;
  background:#151b33;
  font-size:24px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:13px;
  color:#9ca3af;
}

.login{
  padding:20px;
}

.main{
  flex:1;
  display:none;
  overflow:hidden;
}

.sidebar{
  width:280px;
  background:#111827;
  border-right:1px solid #25304d;
  padding:15px;
  overflow-y:auto;
}

.content{
  flex:1;
  display:flex;
  flex-direction:column;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:12px;
  border:0;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  margin-top:10px;
  padding:14px 20px;
  border:0;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:#38bdf8;
}

button.secondary{
  background:#334155;
  color:white;
}

.user{
  padding:12px;
  background:#1d2747;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.user:hover{
  background:#26345f;
}

.user.active{
  background:#075985;
}

.chat-title{
  padding:15px 20px;
  background:#111827;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.empty{
  color:#9ca3af;
  padding:20px;
}

.msg{
  background:#1d2747;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  max-width:75%;
}

.msg.me{
  margin-left:auto;
  background:#075985;
}

.name{
  color:#38bdf8;
  font-weight:bold;
  margin-bottom:4px;
}

.msg.me .name{
  color:#bae6fd;
}

.time{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
}

.send{
  display:flex;
  gap:10px;
  padding:15px;
  background:#151b33;
}

.send input{
  margin:0;
}

.send button{
  margin:0;
}

@media(max-width:700px){
  .main{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    max-height:220px;
    border-right:0;
    border-bottom:1px solid #25304d;
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div>💬 Telegrom</div>
    <div class="small" id="currentUserText"></div>
  </div>

  <div class="login" id="loginBox">
    <h2>Введи свой ник</h2>
    <input id="usernameInput" placeholder="Например: nikon">
    <button onclick="saveUsername()">Войти</button>
  </div>

  <div class="main" id="mainBox">
    <div class="sidebar">
      <h3>Пользователи</h3>
      <div id="usersList"></div>
      <button class="secondary" onclick="changeUsername()">Сменить ник</button>
    </div>

    <div class="content">
      <div class="chat-title" id="chatTitle">Выбери пользователя слева</div>
      <div class="chat" id="chat">
        <div class="empty">Личная переписка появится здесь.</div>
      </div>

      <div class="send" id="sendBox" style="display:none;">
        <input id="messageInput" placeholder="Сообщение..." onkeydown="handleEnter(event)">
        <button onclick="sendPrivateMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
const db = window.supabase.createClient(
  "https://xflrmkcashrosgmsyxeg.supabase.co",
  "sb_publishable_AAUgqla1G4Xi4N0vk2B9jw_Eg-yj1Jm"
);

let username = localStorage.getItem("telegrom_username");
let friend = localStorage.getItem("telegrom_friend");
let refreshTimer = null;
let usersTimer = null;

if(username){
  startApp();
}

async function saveUsername(){
  const input = document.getElementById("usernameInput");
  const value = input.value.trim();

  if(value.length < 2){
    alert("Ник слишком короткий");
    return;
  }

  username = value;
  localStorage.setItem("telegrom_username", username);

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .eq("username", username);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  if(!data || data.length === 0){
    const { error: insertError } = await db
      .from("telegrom_users")
      .insert([{ username: username }]);

    if(insertError){
      alert("Ошибка: " + insertError.message);
      console.error(insertError);
      return;
    }
  }

  startApp();
}

function startApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("mainBox").style.display = "flex";
  document.getElementById("currentUserText").textContent = "Ты: " + username;

  loadUsers();

  if(!usersTimer){
    usersTimer = setInterval(loadUsers, 4000);
  }

  if(friend){
    openChat(friend);
  }
}

async function loadUsers(){
  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderUsers(data || []);
}

function renderUsers(users){
  const list = document.getElementById("usersList");
  list.innerHTML = "";

  const filtered = users.filter(user => user.username !== username);

  if(filtered.length === 0){
    list.innerHTML = '<div class="small">Пока других пользователей нет.</div>';
    return;
  }

  filtered.forEach(user => {
    const div = document.createElement("div");
    div.className = "user";

    if(user.username === friend){
      div.classList.add("active");
    }

    div.textContent = "👤 " + user.username;
    div.onclick = () => openChat(user.username);

    list.appendChild(div);
  });
}

function openChat(selectedUser){
  friend = selectedUser;
  localStorage.setItem("telegrom_friend", friend);

  document.getElementById("chatTitle").textContent = "Личный чат: " + username + " ↔ " + friend;
  document.getElementById("sendBox").style.display = "flex";

  loadUsers();
  loadPrivateMessages();

  if(!refreshTimer){
    refreshTimer = setInterval(loadPrivateMessages, 2000);
  }
}

async function sendPrivateMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!friend){
    alert("Сначала выбери пользователя");
    return;
  }

  if(!text) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .insert([
      {
        from_user: username,
        to_user: friend,
        messages: text
      }
    ]);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  input.value = "";
  loadPrivateMessages();
}

async function loadPrivateMessages(){
  if(!username || !friend) return;

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("*")
    .or(
      `and(from_user.eq.${username},to_user.eq.${friend}),and(from_user.eq.${friend},to_user.eq.${username})`
    )
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderMessages(data || []);
}

function renderMessages(messages){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if(!messages || messages.length === 0){
    chat.innerHTML = '<div class="empty">Пока сообщений нет. Напиши первым.</div>';
    return;
  }

  messages.forEach(addMessageToChat);
  chat.scrollTop = chat.scrollHeight;
}

function addMessageToChat(item){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg";

  if(item.from_user === username){
    div.classList.add("me");
  }

  div.innerHTML = `
    <div class="name">${escapeHtml(item.from_user)}</div>
    <div>${escapeHtml(item.messages)}</div>
    <div class="time">${new Date(item.created_at).toLocaleString()}</div>
  `;

  chat.appendChild(div);
}

function changeUsername(){
  localStorage.removeItem("telegrom_username");
  localStorage.removeItem("telegrom_friend");
  location.reload();
}

function handleEnter(event){
  if(event.key === "Enter"){
    sendPrivateMessage();
  }
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
